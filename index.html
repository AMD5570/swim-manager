<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SplitTime - A Simple Swim Manager</title>
  <link href="static/styles.css" rel="stylesheet" />
  <link href="static/images/splittime-icon.svg" rel="icon" type="image/x-icon" />
  <!-- stuff for pdf and cvs export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <script src="static/main.js" defer></script>
</head>

<body>

  <header>
    <h1>SplitTime - <small style="opacity: 0.7">A Simple Swim Manager</small></h1>
    <h4 style="opacity: 0.9">Create heatsheets and keep track of your swimmer's times! Export your sheet as a CVS or PDF to print or share elsewhere!</h4>
  </header>

  <hr>

  <div class="app-layout">

    <!-- sidebar -->
     <aside class="sidebar">
        <h2>Meets</h2>
        <button onclick="newMeet()">+ New Meet</button>
        <div id="meetList"></div>
     </aside>

    <main>

      <div id="noMeet">
        <p>Click "New Meet" to get started!</p>
      </div>

      <div id="meetContent" style="display: none">

        <!-- Add Event Form -->
        <h2 id="mainEventTxt">Add Events</h2>
        <div class="form-row">
          <select id="eventName">
            <option value="" disabled selected>- Select an event -</option>
            <option value="" disabled>Freestyle</option>
            <option>50yd Freestyle</option>
            <option>100yd Freestyle</option>
            <option>200yd Freestyle</option>
            <option>500yd Freestyle</option>
            <option>1000yd Freestyle</option>
            <option>1650yd Freestyle</option>

            <option value="" disabled>Backstroke</option>
            <option>50yd Backstroke</option>
            <option>100yd Backstroke</option>
            <option>200yd Backstroke</option>

            <option value="" disabled>Butterfly</option>
            <option>50yd Butterfly</option>
            <option>100yd Butterfly</option>
            <option>200yd Butterfly</option>

            <option value="" disabled>Breaststroke</option>
            <option>50yd Breaststroke</option>
            <option>100yd Breaststroke</option>
            <option>200yd Breaststroke</option>

            <option value="" disabled>Individual Medley</option>
            <option>100yd Individual Medley</option>
            <option>200yd Individual Medley</option>
            <option>400yd Individual Medley</option>

            <option value="" disabled>Medley Relay</option>
            <option>200yd Medley Relay</option>
            <option>400yd Medley Relay</option>

            <option value="" disabled>Freestyle Relay</option>
            <option>200yd Freestyle Relay</option>
            <option>400yd Freestyle Relay</option>
          </select>
          <select id="eventGender">
            <option value="" disabled selected>- Men/Women -</option>
            <option>Men's</option>
            <option>Women's</option>
            <option>Mixed</option>
          </select>
          <input type="number" id="eventHeat" placeholder="Heat #" style="width: 80px" min="1" value="1" />
          <button class="addEventBttn" onclick="addEvent()">Add Event</button>
          <div class="export">
            <button class="exportBttn" onclick="saveMeet()">Save Meet</button>
            <button class="exportBttn" onclick="exportCSV()">Export CSV</button>
            <button class="exportBttn" onclick="exportPDF()">Export PDF</button>
          </div>
        </div>

        <!-- Events will be rendered here -->
        <div id="eventList"></div>
      </div>
    </main>

  </div>

  <footer>
    <p>&copy; Austin deHaan -
      <script>document.write(new Date().getFullYear())</script> <br>
      <small>v. 1.0.2</small>
    </p>
  </footer>
</body>

</html>
